<svg width="100%" viewBox="0 0 1100 400" xmlns="http://www.w3.org/2000/svg">
<title>LuzaniDev — animated pipeline banner</title>
<defs>
  <radialGradient id="bgGlow" cx="32%" cy="55%" r="80%">
    <stop offset="0%" stop-color="#101a22"/>
    <stop offset="100%" stop-color="#06090d"/>
  </radialGradient>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00e5a0"/>
    <stop offset="50%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#ffb020"/>
  </linearGradient>
</defs>

<!-- card -->
<rect x="3" y="3" width="1094" height="394" rx="26" fill="url(#bgGlow)" stroke="url(#borderGrad)" stroke-width="1.5" stroke-opacity="0.55"/>

<!-- traveling light pulses around the border -->
<g fill="#00e5a0">
  <circle r="4" opacity="0.95">
    <animateMotion dur="6s" repeatCount="indefinite" path="M26,18 H1074 V382 H26 Z"/>
  </circle>
  <circle r="3" opacity="0.55">
    <animateMotion dur="6s" begin="0.18s" repeatCount="indefinite" path="M26,18 H1074 V382 H26 Z"/>
  </circle>
  <circle r="2" opacity="0.3">
    <animateMotion dur="6s" begin="0.34s" repeatCount="indefinite" path="M26,18 H1074 V382 H26 Z"/>
  </circle>
</g>

<!-- background data-pipeline network (right side) -->
<g stroke="#1c2530" stroke-width="1.3" opacity="0.85">
  <line x1="650" y1="90" x2="760" y2="70"/>
  <line x1="760" y1="70" x2="880" y2="112"/>
  <line x1="880" y1="112" x2="982" y2="160"/>
  <line x1="700" y1="202" x2="822" y2="232"/>
  <line x1="822" y1="232" x2="942" y2="280"/>
  <line x1="700" y1="332" x2="860" y2="342"/>
  <line x1="860" y1="342" x2="1000" y2="300"/>
</g>

<g>
  <circle cx="650" cy="90" r="3" fill="#00e5a0"><animate attributeName="opacity" values="0.35;0.9;0.35" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="70" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle>
  <circle cx="880" cy="112" r="3" fill="#ffb020"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.4s" begin="0.9s" repeatCount="indefinite"/></circle>
  <circle cx="982" cy="160" r="3" fill="#00e5a0"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.9s" begin="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="202" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="3.6s" begin="0.2s" repeatCount="indefinite"/></circle>
  <circle cx="822" cy="232" r="3" fill="#ffb020"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="942" cy="280" r="3" fill="#00e5a0"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="3.2s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="332" r="3" fill="#38bdf8"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" begin="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="860" cy="342" r="3" fill="#ffb020"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.0s" begin="0.3s" repeatCount="indefinite"/></circle>
  <circle cx="1000" cy="300" r="3" fill="#00e5a0"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="2.5s" begin="0.8s" repeatCount="indefinite"/></circle>
</g>

<!-- traveling data packets along the pipeline -->
<g fill="#00e5a0">
  <circle r="2.6"><animateMotion dur="2.2s" repeatCount="indefinite" path="M650,90 L760,70"/></circle>
  <circle r="2.6" fill="#ffb020"><animateMotion dur="2.4s" begin="0.5s" repeatCount="indefinite" path="M880,112 L982,160"/></circle>
  <circle r="2.6" fill="#38bdf8"><animateMotion dur="2.1s" begin="1s" repeatCount="indefinite" path="M822,232 L942,280"/></circle>
  <circle r="2.6"><animateMotion dur="2.3s" begin="0.2s" repeatCount="indefinite" path="M860,342 L1000,300"/></circle>
</g>

<!-- status / online indicator -->
<g>
  <circle cx="1010" cy="46" r="4" stroke="#00e5a0" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="r" values="4;34" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="46" r="4" stroke="#00e5a0" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="r" values="4;34" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="46" r="4" stroke="#00e5a0" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="r" values="4;34" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="46" r="4" fill="#00e5a0"/>
  <text x="965" y="51" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace" font-size="12" fill="#6b7280">online</text>
</g>

<!-- boot log line 1 -->
<g clip-path="url(#clip1)">
  <text x="70" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace" font-size="19" fill="#58a6ff">$ ssh deploy@LuzaniDev</text>
</g>
<clipPath id="clip1">
  <rect x="66" y="48" height="34" width="0">
    <animate attributeName="width" values="0;0;290;290" keyTimes="0;0.0333;0.1111;1" dur="9s" repeatCount="indefinite"/>
  </rect>
</clipPath>

<!-- boot log line 2 -->
<g clip-path="url(#clip2)">
  <text x="70" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace" font-size="17" fill="#6b7280">authenticating&#8230; access granted <tspan fill="#00e5a0">&#10003;</tspan></text>
</g>
<clipPath id="clip2">
  <rect x="66" y="80" height="30" width="0">
    <animate attributeName="width" values="0;0;420;420" keyTimes="0;0.1444;0.2333;1" dur="9s" repeatCount="indefinite"/>
  </rect>
</clipPath>

<!-- hero wordmark -->
<g transform="translate(70,250)">
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,18;0,18;0,0;0,0" keyTimes="0;0.2667;0.3556;1" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.2667;0.3556;1" dur="9s" repeatCount="indefinite"/>
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace" font-size="108" font-weight="800" letter-spacing="-1">
      <animate attributeName="fill" values="#00e5a0;#f1f5f9;#ffb020;#00e5a0" dur="5s" repeatCount="indefinite"/>
      LuzaniDev
    </text>
    <rect x="2" y="18" width="0" height="5" fill="#ffb020">
      <animate attributeName="width" values="0;0;624;624" keyTimes="0;0.2667;0.3556;1" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>
</g>

<!-- tags -->
<g opacity="0">
  <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.3667;0.4;1" dur="9s" repeatCount="indefinite"/>
  <text x="70" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace" font-size="20" fill="#8b949e">IA &#183; Engenharia de Dados &#183; Backend &#183; Python</text>
</g>

<line x1="70" y1="322" x2="1030" y2="322" stroke="#1c2530" stroke-width="1.5"/>

<!-- status line -->
<g clip-path="url(#clip3)">
  <text x="70" y="355" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace" font-size="18" fill="#c9d1d9">$ status: Implantando pipelines, um commit de cada vez.</text>
</g>
<clipPath id="clip3">
  <rect x="66" y="333" height="34" width="0">
    <animate attributeName="width" values="0;0;640;640" keyTimes="0;0.4444;0.5444;1" dur="9s" repeatCount="indefinite"/>
  </rect>
</clipPath>

<rect x="715" y="340" width="11" height="19" fill="#ffb020">
  <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
</rect>

</svg>
